name: Release dashboard 

on:
  push:
    tags:
      - "dashboard-*"

permissions:
  contents: write
  packages: write

jobs:
  dashboard_build:
    name: dashboard-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - uses: extractions/setup-just@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: oven-sh/setup-bun@v2

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Dashboard build
        run: just dashboard

  docker:
    needs: [dashboard_build]
    name: docker
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        include:
          - dockerfile: ./build/dashboard/Dockerfile
            image: feedback-fusion-dashboard

    steps:
      - name: Checkout Sources
        uses: actions/checkout@v4

      - name: Extract version
        run: |
          VERSION=${GITHUB_REF_NAME#dashboard-v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Login into repository
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ghcr.io/onelitefeathernet/${{ matrix.image }}:${{env.VERSION}},ghcr.io/onelitefeathernet/${{ matrix.image }}:latest
