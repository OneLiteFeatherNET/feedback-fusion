name: Continuous integration

on:
  workflow_dispatch:
  pull_request:
  merge_group:
  push: 
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  dashboard_build:
    name: dashboard-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - uses: extractions/setup-just@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: oven-sh/setup-bun@v2

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Dashboard build
        run: just dashboard

  lib_build:
    name: lib-build 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - uses: extractions/setup-just@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: oven-sh/setup-bun@v2

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Lib build
        run: just lib

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Sources
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
          components: clippy
          cache: false

      - uses: extractions/setup-just@v2

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run clippy
        run: just clippy 

  test:
    needs: [clippy]
    name: tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Sources
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: "" 
          cache: false

      - uses: extractions/setup-just@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install FluvioCLI
        run: |
          curl -fsS https://raw.githubusercontent.com/fluvio-community/fluvio/master/install.sh | FVM_VERSION=dev bash

      - name: Tests
        run: |
          export PATH=${PATH}:~/.fluvio/bin:~/.fvm/bin
          just test-all

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
